<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polynomial based logistic Regression</title>
    <style>
        /* Base Colors (Dark Mode Default) */
        :root {
            --bg-color: #0b1120;
            --card-bg: rgba(30, 41, 59, 0.85);
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            /* Sparkling Border Gradient */
            --border-sparkle: linear-gradient(90deg, #00f2fe, #4facfe, #f093fb, #00f2fe);
            --input-bg: rgba(255, 255, 255, 0.05);
            --input-border: rgba(255, 255, 255, 0.2);
        }

        /* Light Mode Colors */
        [data-theme="light"] {
            --bg-color: #f0f4f8;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-color: #0f172a;
            --accent-color: #0284c7;
            --border-sparkle: linear-gradient(90deg, #3b82f6, #06b6d4, #8b5cf6, #3b82f6);
            --input-bg: rgba(0, 0, 0, 0.03);
            --input-border: rgba(0, 0, 0, 0.2);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.4s ease, color 0.4s ease;
            overflow: hidden; /* Scrollbar hatane ke liye */
        }

        /* Tech Particle Background */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none; /* Taki clicks block na hon */
        }

        /* Main Card Container */
        .form-container {
            background-color: var(--card-bg);
            padding: 45px 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 450px;
            position: relative;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            z-index: 1;
            transition: background-color 0.4s ease;
        }

        /* Sparkling Animated Border */
        .form-container::before {
            content: '';
            position: absolute;
            top: -3px; left: -3px; right: -3px; bottom: -3px;
            background: var(--border-sparkle);
            background-size: 300%;
            z-index: -1;
            border-radius: 19px;
            animation: sparkle 6s linear infinite;
        }

        @keyframes sparkle {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 26px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 8px;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
            opacity: 0.9;
        }

        input[type="text"] {
            padding: 14px;
            margin-bottom: 25px;
            border-radius: 8px;
            border: 1px solid var(--input-border);
            background-color: var(--input-bg);
            color: var(--text-color);
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 12px rgba(56, 189, 248, 0.4);
        }

        input[type="submit"] {
            padding: 16px;
            border-radius: 8px;
            border: none;
            background-color: #10b981; /* Stylish Green */
            color: white;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
        }

        input[type="submit"]:hover {
            background-color: #059669;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
        }
        <br>
        {% if prediction_text %}
            <div style="margin-top: 15px; padding: 15px; border-radius: 8px; background: rgba(16, 185, 129, 0.1); border: 1px solid #10b981; color: #10b981; font-weight: bold; font-size: 1.2rem; text-shadow: 0 0 8px rgba(16, 185, 129, 0.4);">
                {{ prediction_text }}
            </div>
        {% endif %}
        /* Theme Toggle Button */
        #theme-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            padding: 10px 18px;
            border-radius: 30px;
            border: 1px solid var(--accent-color);
            background: rgba(255,255,255,0.05);
            color: var(--text-color);
            cursor: pointer;
            font-weight: 600;
            backdrop-filter: blur(5px);
            transition: 0.3s;
            z-index: 10;
        }

        #theme-btn:hover {
            background-color: var(--accent-color);
            color: #fff;
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <button id="theme-btn" onclick="toggleTheme()">🌓 Change Mode</button>

    <div class="form-container">
        <h2>Polynomial Logistic Regression</h2>
        
        <form action="/predict" method="post">
            <label for="x1">Value of x1:</label>
            <input type="text" id="x1" name="x1" required placeholder="Enter x1">
            
            <label for="x2">Value of x2:</label>
            <input type="text" id="x2" name="x2" required placeholder="Enter x2">
            
            <input type="submit" value="Predict Output">
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // Dark/Light Mode Logic
        function toggleTheme() {
            const body = document.body;
            if (body.hasAttribute('data-theme')) {
                body.removeAttribute('data-theme');
            } else {
                body.setAttribute('data-theme', 'light');
            }
        }

        // ML/Tech Particles Logic
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 70, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#38bdf8" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.4, "random": false },
                "size": { "value": 3, "random": true },
                "line_linked": {
                    "enable": true,
                    "distance": 150,
                    "color": "#38bdf8",
                    "opacity": 0.3,
                    "width": 1.5
                },
                "move": {
                    "enable": true,
                    "speed": 1.5,
                    "direction": "none",
                    "random": false,
                    "straight": false,
                    "out_mode": "out",
                    "bounce": false,
                }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": { "enable": true, "mode": "grab" },
                    "resize": true
                },
                "modes": {
                    "grab": { "distance": 140, "line_linked": { "opacity": 0.8 } }
                }
            },
            "retina_detect": true
        });
    </script>

</body>
</html>
