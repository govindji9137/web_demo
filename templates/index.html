<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polynomial Logistic Regression</title>
    <style>
        /* Base Colors */
        :root {
            --bg-color: #0b1120;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --border-sparkle: linear-gradient(90deg, #00f2fe, #4facfe, #f093fb, #00f2fe);
        }

        [data-theme="light"] {
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-color: #0f172a;
            --accent-color: #0284c7;
            --border-sparkle: linear-gradient(90deg, #3b82f6, #06b6d4, #8b5cf6, #3b82f6);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            transition: 0.3s ease;
        }

        #particles-js {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Fixed Theme Button */
        #theme-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid var(--accent-color);
            background: var(--card-bg);
            color: var(--text-color);
            cursor: pointer;
            font-weight: bold;
            z-index: 100;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        #theme-btn:hover { background-color: var(--accent-color); color: #fff; }

        /* Safest way to make a gradient border */
        .card-wrapper {
            position: relative;
            padding: 3px; /* Border thickness */
            border-radius: 19px;
            background: var(--border-sparkle);
            background-size: 300%;
            animation: sparkle 6s linear infinite;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }

        @keyframes sparkle {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Inner Solid Card */
        .form-container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            text-align: left;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 24px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        form { display: flex; flex-direction: column; }

        label { margin-bottom: 8px; font-size: 14px; font-weight: 600; opacity: 0.9; }

        input[type="text"] {
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid rgba(128, 128, 128, 0.3);
            background-color: rgba(128, 128, 128, 0.05);
            color: var(--text-color);
            font-size: 15px;
            outline: none;
        }

        input[type="text"]:focus { border-color: var(--accent-color); }

        input[type="submit"] {
            padding: 15px;
            border-radius: 8px;
            border: none;
            background-color: #10b981;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }

        input[type="submit"]:hover { background-color: #059669; }

        /* Output Box Style */
        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background-color: rgba(16, 185, 129, 0.15);
            border: 1px solid #10b981;
            color: #10b981;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>
    <button id="theme-btn" onclick="toggleTheme()">🌓 Change Mode</button>

    <div class="card-wrapper">
        <div class="form-container">
            <h2>Polynomial Logistic Regression</h2>
            
            <form action="/predict" method="post">
                <label for="x1">Value of x1:</label>
                <input type="text" id="x1" name="x1" required placeholder="Enter x1">
                
                <label for="x2">Value of x2:</label>
                <input type="text" id="x2" name="x2" required placeholder="Enter x2">
                
                <input type="submit" value="Predict Output">
            </form>

            {% if prediction_text %}
                <div class="result-box">{{ prediction_text }}</div>
            {% endif %}
            
            {% if result %}
                <div class="result-box">{{ result }}</div>
            {% endif %}

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        function toggleTheme() {
            const body = document.body;
            if (body.hasAttribute('data-theme')) {
                body.removeAttribute('data-theme');
            } else {
                body.setAttribute('data-theme', 'light');
            }
        }

        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 60 },
                "color": { "value": "#38bdf8" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.3 },
                "size": { "value": 2 },
                "line_linked": {
                    "enable": true,
                    "distance": 150,
                    "color": "#38bdf8",
                    "opacity": 0.2,
                    "width": 1
                },
                "move": { "enable": true, "speed": 1 }
            }
        });
    </script>
</body>
</html>
